services:
  unblock-focus-backend:
    build: ../
    container_name: unblock-focus-backend
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - backend_data:/app/data
      - backend_media:/app/media
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - unblock-network

  redis:
    image: redis:7-alpine
    container_name: unblock-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - unblock-network

networks:
  unblock-network:
    driver: bridge

volumes:
  backend_data:
  backend_media:
  redis_data:
