# ==========================================
# Redirect HTTP → HTTPS
# ==========================================
server {
    listen 80;
    server_name api.yourdomain.com; # TODO: Replace with your actual domain or VPS subdomain
    return 301 https://$host$request_uri;
}

# ==========================================
# API Server & Media Router
# ==========================================
server {
    listen 443 ssl http2;
    server_name api.yourdomain.com; # TODO: Replace with your actual domain or VPS subdomain

    # SSL Certificates (managed by certbot/Let's Encrypt on Hostinger VPS)
    ssl_certificate /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Proxy to FastAPI App Container
    location / {
        proxy_pass http://127.0.0.1:8001;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering specifically for SSE (Server-Sent Events) streaming
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache off;
        proxy_buffering off;
        chunked_transfer_encoding off;

        proxy_read_timeout 600;
        proxy_send_timeout 600;
    }
}
